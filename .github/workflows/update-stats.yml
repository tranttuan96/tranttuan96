name: Generate Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Generate GitHub Stats
        uses: stats-organization/github-readme-stats-action@main
        with:
          token: ${{ secrets.GH_TOKEN }}
          card: stats
          options: "username=tranttuan96&show_icons=true&theme=radical&hide_border=true&count_private=true&include_all_commits=true&hide=stars,issues,contribs&hide_rank=true"
          path: stats.svg

      - name: Commit Stats
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git commit -m "docs: auto update github stats" || exit 0
          git push
